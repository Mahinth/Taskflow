<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A modern, beautiful To-Do List application to manage your daily tasks efficiently." />
  <title>TaskFlow — Modern To-Do List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-bg"></div>

  <div class="container" id="app-container">
    <!-- Header -->
    <header class="app-header" id="app-header">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <h1>TaskFlow</h1>
      </div>
      <p class="tagline">Organize your day, one task at a time</p>
    </header>

    <!-- Add Task Form -->
    <form class="add-task-form" id="add-task-form">
      <div class="input-wrapper">
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="What needs to be done?"
          maxlength="200"
          autocomplete="off"
          aria-label="New task title"
        />
        <button type="submit" class="btn-add" id="btn-add" aria-label="Add task">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
      </div>
    </form>

    <!-- Filter Bar -->
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" data-filter="all" id="filter-all">All</button>
      <button class="filter-btn" data-filter="active" id="filter-active">Active</button>
      <button class="filter-btn" data-filter="completed" id="filter-completed">Completed</button>
      <span class="task-counter" id="task-counter">0 tasks</span>
    </div>

    <!-- Task List -->
    <div class="task-list-wrapper" id="task-list-wrapper">
      <ul class="task-list" id="task-list">
        <!-- Tasks injected by JS -->
      </ul>

      <!-- Empty State -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📋</div>
        <p class="empty-title">No tasks yet</p>
        <p class="empty-subtitle">Add your first task above to get started!</p>
      </div>

      <!-- Loading State -->
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <p>Loading tasks...</p>
      </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
